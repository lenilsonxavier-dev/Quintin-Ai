<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candinho - IA Local com WebLLM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 800px; background: #16213e; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .avatar { width: 70px; height: 70px; background: linear-gradient(135deg, #e94560, #ffd700); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; }
        #chat { height: 400px; overflow-y: auto; background: #0f3460; padding: 15px; border-radius: 15px; margin-bottom: 15px; }
        #status { color: #ffd700; margin-bottom: 10px; }
        .progress-bar { width: 0%; height: 8px; background: #e94560; border-radius: 4px; transition: width 0.3s; margin-bottom: 20px; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; }
        button { padding: 12px 25px; border-radius: 25px; background: #e94560; color: white; border: none; cursor: pointer; }
        button:disabled { background: #555; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 10px; }
        .user-msg { background: #1b6ca8; text-align: right; }
        .ai-msg { background: #533483; }
        .error { color: #ff6b6b; }
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: wave 1.3s infinite;
        }
        @keyframes wave {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        .small-note { font-size: 12px; color: #aaa; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="avatar">🎨</div>
    <h1>Candinho 🎨</h1>
    <small>IA 100% Local - Modelo Leve (Llama 3.2 1B)</small>
    
    <div id="status">⚙️ Inicializando e baixando o modelo... (Aguarde)</div>
    <div class="progress-bar" id="progress"></div>
    
    <div id="chat">
        <div class="msg ai-msg">
            <b>Candinho:</b><br>
            Olá! Sou o Candinho. Pergunte sobre arte! 🎨
        </div>
    </div>
    
    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Digite sua pergunta..." disabled>
        <button onclick="enviar()" id="btnEnviar" disabled>Enviar 📤</button>
    </div>
    <div class="small-note">*O modelo será baixado uma vez e depois funcionará offline.</div>
</div>

<script type="importmap">
    {
        "imports": {
            "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm"
        }
    }
</script>

<script type="module">
    import { CreateMLCEngine } from "@mlc-ai/web-llm";

    // --- ESCOLHA O MODELO AQUI ---
    // Recomendados:
    // "Llama-3.2-1B-Instruct-q4f16_1-MLC" - Melhor custo-benefício (Recomendado)
    // "SmolLM2-360M-Instruct-q4f16_1-MLC" - Muito leve e rápido
    // "SmolLM2-135M-Instruct-q0f32-MLC" - Ultrarrápido para testes
    const selectedModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
    
    const statusDiv = document.getElementById("status");
    const progressDiv = document.getElementById("progress");
    const chatDiv = document.getElementById("chat");
    const input = document.getElementById("pergunta");
    const btn = document.getElementById("btnEnviar");

    let engine = null;
    let historicoConversa = [];

    async function init() {
        // Verifica suporte a WebGPU
        if (!navigator.gpu) {
            statusDiv.innerHTML = "<span class='error'>❌ WebGPU não suportado! Use Chrome, Edge ou Opera mais recentes.</span>";
            return;
        }

        try {
            statusDiv.innerText = `📦 Baixando modelo ${selectedModel}... (pode levar alguns minutos na primeira vez)`;
            progressDiv.style.width = "0%";
            
            console.log("Iniciando carregamento do modelo:", selectedModel);
            
            // Cria o motor do WebLLM
            engine = await CreateMLCEngine(selectedModel, { 
                initProgressCallback: (progress) => {
                    console.log("Progresso:", progress);
                    if (progress.text) statusDiv.innerText = progress.text;
                    if (progress.progress) {
                        const percent = Math.round(progress.progress * 100);
                        progressDiv.style.width = percent + "%";
                        
                        if (percent >= 100) {
                            statusDiv.innerHTML = "<span style='color:#4ecdc4;'>✅ Candinho está pronto! Pode perguntar! 🎨</span>";
                            input.disabled = false;
                            btn.disabled = false;
                            input.placeholder = "Ex: Quem pintou a Monalisa?";
                            input.focus();
                        }
                    }
                }
            });
            
            // Configura o prompt de sistema
            historicoConversa = [{
                role: "system",
                content: "Você é o Candinho, um mentor de arte alegre e divertido para crianças de 10 anos. Responda sempre em português do Brasil, use emojis de arte (🎨, 🖌️, 🖼️, 🌈), seja positivo e incentive a criatividade. Responda em no máximo 3-4 frases curtas."
            }];
            
        } catch (e) {
            console.error("Erro:", e);
            statusDiv.innerHTML = `<span class='error'>❌ Erro: ${e.message || e}</span>`;
            input.disabled = true;
            btn.disabled = true;
        }
    }

    function addMensagem(role, texto) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
        msgDiv.innerHTML = `<b>${role === 'user' ? 'Você' : 'Candinho'}:</b><br>${escapeHtml(texto)}`;
        chatDiv.appendChild(msgDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function mostrarDigitacao() {
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typing';
        typingDiv.className = 'msg ai-msg';
        typingDiv.innerHTML = '<b>Candinho:</b><br><div class="typing"><span></span><span></span><span></span> pensando...</div>';
        chatDiv.appendChild(typingDiv);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
    
    function removerDigitacao() {
        const typing = document.getElementById('typing');
        if (typing) typing.remove();
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    window.enviar = async function() {
        if (!engine) {
            alert("Modelo ainda não carregou!");
            return;
        }
        
        const pergunta = input.value.trim();
        if (!pergunta) return;
        
        input.disabled = true;
        btn.disabled = true;
        
        addMensagem('user', pergunta);
        input.value = '';
        
        mostrarDigitacao();
        
        try {
            // Adiciona ao histórico
            historicoConversa.push({ role: "user", content: pergunta });
            
            // Limita o histórico para 5 mensagens
            const historicoParaEnviar = [historicoConversa[0], ...historicoConversa.slice(-5)];
            
            // Gera resposta
            const reply = await engine.chat.completions.create({
                messages: historicoParaEnviar,
                max_tokens: 200,
                temperature: 0.7
            });
            
            const resposta = reply.choices[0].message.content;
            
            removerDigitacao();
            addMensagem('assistant', resposta);
            
            // Salva resposta no histórico
            historicoConversa.push({ role: "assistant", content: resposta });
            
        } catch (err) {
            console.error("Erro na geração:", err);
            removerDigitacao();
            addMensagem('assistant', "😅 Ops! Tive um probleminha. Pode repetir?");
        } finally {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        }
    };
    
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !btn.disabled && engine) enviar();
    });

    // Inicializa
    init();
</script>
</body>
</html>
