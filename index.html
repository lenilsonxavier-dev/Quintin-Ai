<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Candinho Lite</title>

<style>

body{
  margin:0;
  background:#f3f4f6;
  font-family:Arial;
}

.chat-container{
  width:100%;
  max-width:800px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
}

.topo{
  background:#10b981;
  color:white;
  padding:18px;
  font-size:22px;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.msg{
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  max-width:80%;
}

.user{
  background:#2563eb;
  color:white;
  margin-left:auto;
}

.bot{
  background:white;
  border:1px solid #ddd;
}

.entrada{
  display:flex;
  padding:10px;
  background:white;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-left:10px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#10b981;
  color:white;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="topo">
    🌿 Candinho Lite
  </div>

  <div id="chat"></div>

  <div class="entrada">
    <input id="pergunta" placeholder="Digite sua pergunta...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
