<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candinho Lite</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f3f4f6;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.chat-container{
  width:100%;
  max-width:850px;
  height:95vh;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.1);

  display:flex;
  flex-direction:column;
}

.topo{
  background:#10b981;
  color:white;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  background:#f9fafb;
}

.msg{
  padding:14px;
  border-radius:14px;
  margin-bottom:14px;
  max-width:80%;
  line-height:1.5;
}

.user{
  background:#2563eb;
  color:white;
  margin-left:auto;
}

.bot{
  background:white;
  border:1px solid #ddd;
}

.entrada{
  display:flex;
  gap:10px;
  padding:15px;
  background:white;
  border-top:1px solid #ddd;
}

input{
  flex:1;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  background:#10b981;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  opacity:0.9;
}

</style>

</head>

<body>

<div class="chat-container">

  <div class="topo">
    🌿 Candinho Lite
  </div>

  <div id="chat"></div>

  <div class="entrada">
    <input id="pergunta" placeholder="Digite sua pergunta...">
    <button onclick="enviar()">Enviar</button>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
